name: Apply clang-format

on:
  issue_comment:
    types: [created]
  # TODO: Remove push trigger and workflow_dispatch before merging to main
  push:
    branches:
      - dev/dhoeflin/clang_format_command
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to apply clang-format to'
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-clang-format:
    # Only run on PR comments containing /clang-format, manual dispatch, or push (for testing)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event.issue.pull_request && contains(github.event.comment.body, '/clang-format'))
    runs-on: ubuntu-latest
    steps:
      - name: React with eyes to acknowledge
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

      - name: Get PR details and check permissions
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            // For push trigger, hardcode PR number for testing
            // TODO: Remove push case before merging to main
            const prNumber = context.eventName === 'issue_comment'
              ? context.issue.number
              : (context.eventName === 'workflow_dispatch'
                ? ${{ github.event.inputs.pr_number || 0 }}
                : 2592);

            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            // Permission checks only for comment trigger
            if (context.eventName === 'issue_comment') {
              const association = context.payload.comment.author_association;
              const isPrAuthor = context.payload.comment.user.login === pr.data.user.login;
              const isCollaborator = ['OWNER', 'MEMBER'].includes(association);

              if (!isPrAuthor && !isCollaborator) {
                core.setFailed('Only repository members or the PR author can trigger /clang-format');
                return;
              }
            }

            // Cannot push to fork branches
            if (pr.data.head.repo.full_name !== '${{ github.repository }}') {
              core.setFailed('Cannot apply clang-format to PRs from forks. Please apply changes locally.');
              return;
            }

            core.setOutput('head_ref', pr.data.head.ref);
            core.setOutput('head_sha', pr.data.head.sha);
            core.setOutput('base_sha', pr.data.base.sha);

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Get clang-format
        run: sudo apt-get install -yqq clang-format

      - name: Apply clang-format to changed lines
        run: .github/scripts/clang-format-diff.sh ${{ steps.pr.outputs.head_sha }} ${{ steps.pr.outputs.base_sha }}

      - name: Check for changes and commit
        id: result
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Apply clang-format to PR diff"
            git push
          fi

      - name: Add result reaction
        if: always() && github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const hasChanges = '${{ steps.result.outputs.has_changes }}';
            const success = '${{ job.status }}' === 'success';

            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: success ? (hasChanges === 'true' ? 'rocket' : '+1') : 'confused'
            });
